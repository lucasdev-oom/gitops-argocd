apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solar-system-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lucasdev-oom/gitops-argocd
    targetRevision: main
    path: solar-system/staging        # ← watches staging folder
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:                        # ← AUTO-SYNC for staging
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true          # ← creates staging namespace automatically